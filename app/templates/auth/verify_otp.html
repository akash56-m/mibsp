{% extends 'base.html' %}

{% block title %}Verify OTP{% endblock %}

{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h1 class="h5 mb-0">
                            <i class="fas fa-shield-halved text-primary me-2"></i>Admin OTP Verification
                        </h1>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small mb-3">
                            Enter the one-time code sent to your admin email.
                        </p>
                        <form method="POST" action="{{ url_for('auth.verify_admin_otp') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                            <div class="mb-3">
                                <label for="otp" class="form-label fw-semibold">OTP Code</label>
                                <input type="text" class="form-control form-control-lg" id="otp" name="otp"
                                    inputmode="numeric" autocomplete="one-time-code" maxlength="8" required autofocus>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-check me-1"></i>Verify and Continue
                                </button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-white">
                        <a href="{{ url_for('auth.login') }}" class="btn btn-outline-secondary btn-sm">
                            <i class="fas fa-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
